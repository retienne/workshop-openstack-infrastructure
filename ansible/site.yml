---
- name: Deploy Modern Database Workshop
  hosts: all
  become: yes
  gather_facts: no
  vars_files:
    - group_vars/all.yml

  pre_tasks:
    - name: Wait for SSH to become available
      wait_for_connection:
        timeout: 300
        sleep: 5
      tags: ['always']

    - name: Gather facts if not already gathered
      setup:
      tags: ['always']

  roles:
    - common
    - docker
    - workshop

  post_tasks:
    - name: Generate SERVICES.md locally
      template:
        src: roles/workshop/templates/services.md.j2
        dest: "{{ playbook_dir }}/../SERVICES.md"
      delegate_to: localhost
      become: no
