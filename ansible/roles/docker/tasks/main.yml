---
- name: Install prerequisites for Docker repository
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /etc/apt/keyrings/docker.gpg
    state: present

- name: Add Docker APT repository
  apt_repository:
    repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker components
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Add user to docker group
  user:
    name: "{{ workshop_user }}"
    groups: docker
    append: yes

- name: Download Docker Compose Switch
  get_url:
    url: https://github.com/docker/compose-switch/releases/latest/download/docker-compose-linux-amd64
    dest: /usr/local/bin/compose-switch
    mode: '0755'

- name: Set docker-compose alternative
  alternatives:
    name: docker-compose
    path: /usr/local/bin/compose-switch
    link: /usr/local/bin/docker-compose
    priority: 99
